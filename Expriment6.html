<!DOCTYPE html>
<html>
<head>
    <title>Attractive Iframe Layout</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
        }

        .container {
            display: grid;
            grid-template-rows: 90px 1fr 70px;
            grid-template-columns: 220px 1fr 220px;
            height: 100vh;
        }

        /* HEADER */
        header {
            grid-column: 1 / 4;
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
            line-height: 90px;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        /* MENU */
        nav {
            background: #2c3e50;
            padding: 20px;
            color: white;
        }

        nav h3 {
            border-bottom: 2px solid white;
            padding-bottom: 5px;
        }

        nav a {
            display: block;
            margin: 12px 0;
            padding: 8px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #3498db;
        }

        /* CONTENT */
        main {
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            background: white;
        }

        /* RIGHT PANEL */
        aside {
            background: #f1c40f;
            padding: 20px;
            font-weight: bold;
        }

        /* FOOTER */
        footer {
            grid-column: 1 / 4;
            background: #34495e;
            color: white;
            text-align: center;
            line-height: 70px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <header>
        ✨ My Web Page ✨
    </header>

    <!-- MENU -->
    <nav>
        <h3>Navigation</h3>
        <a href="https://example.com" target="contentFrame">Open Example</a>
        <a href="https://www.wikipedia.org" target="contentFrame">Open Wikipedia</a>
        <a href="https://www.google.com" target="contentFrame">Open Google</a>
    </nav>

    <!-- CONTENT -->
    <main>
        <iframe 
            name="contentFrame"
            srcdoc="
                <h2 style='text-align:center;color:#4facfe;'>Welcome!</h2>
                <p style='text-align:center;font-size:18px;'>
                This is a iframe content area.
                </p>"
            width="100%"
            height="100%"
            title="Styled Content Frame">
        </iframe>
    </main>

    <!-- RIGHT PANEL -->
    <aside>
        🌟 Latest Updates<br><br>
        ✔ New Design<br>
        ✔ Smooth Effects<br>
        ✔ Modern Layout
    </aside>

    <!-- FOOTER -->
    <footer>
        © 2026 My Website | Designed with ❤️
    </footer>

</div>

</body>
</html>

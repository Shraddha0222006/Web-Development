<!DOCTYPE html>
<html>
<head>
    <title>Link Tag Demonstration</title>
</head>

<body>

    <h1>Demonstration of Link Tags in HTML</h1>

    <!-- Text Link -->
    <h2>1. Text Link</h2>
    <p>Click the text below to open a webpage:</p>
    <a href="https://www.wikipedia.org">Open Wikipedia</a>

    <br><br>

    <!-- Website Link -->
    <h2>2. Website Link</h2>
    <p>Click the link below to visit Google website:</p>
    <a href="https://www.google.com" target="_blank">Visit Google</a>

    <br><br>

    <!-- Image Link -->
    <h2>3. Image Link</h2>
    <p>Click the image below:</p>

    <a href="https://www.google.com">
        <img src="https://via.placeholder.com/200" alt="Sample Image">
    </a>

</body>
</html>
